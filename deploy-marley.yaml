apiVersion: apps/v1
kind: Deployment
metadata:
  name: eldia-deployment
  namespace: marley
  labels:
    app: marley
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marley
  template:
    metadata:
      labels:
        app: marley
    spec:
      containers:
      - name: marley
        image: nginx
        ports:
        - containerPort: 80
